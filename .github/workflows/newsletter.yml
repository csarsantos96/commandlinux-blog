name: Newsletter

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/*.md'

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar posts novos
        id: new
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- 'src/content/posts/*.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Criar draft no Buttondown
        if: steps.new.outputs.files != ''
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          FILES: ${{ steps.new.outputs.files }}
        run: |
          python3 - <<'PY'
          import os, re, json, urllib.request

          SITE = "https://www.commandlinux.dev"
          files = os.environ["FILES"].strip().split("\n")

          def parse_frontmatter(path):
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              m = re.match(r"^---\n(.*?)\n---", content, re.S)
              if not m:
                  return None
              fm = {}
              for line in m.group(1).split("\n"):
                  if ":" not in line:
                      continue
                  k, v = line.split(":", 1)
                  fm[k.strip()] = v.strip().strip("'\"")
              return fm

          for path in files:
              if not path:
                  continue
              fm = parse_frontmatter(path)
              if not fm or fm.get("draft") == "true":
                  print(f"skip: {path}")
                  continue

              slug = os.path.basename(path).replace(".md", "")
              url = f"{SITE}/posts/{slug}/"
              title = fm.get("title", slug)
              desc = fm.get("description", "")
              category = fm.get("category", "")

              body = f"""{desc}

          [Ler no blog →]({url})

          ---

          *{category} · CommandLinux*
          """

              payload = json.dumps({
                  "subject": title,
                  "body": body,
                  "status": "draft",
              }).encode()

              req = urllib.request.Request(
                  "https://api.buttondown.com/v1/emails",
                  data=payload,
                  headers={
                      "Authorization": f"Token {os.environ['BUTTONDOWN_API_KEY']}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as res:
                  print(f"draft criado: {title} ({res.status})")
          PY